<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5A27" />
      <stop offset="100%" stop-color="#1C3B1A" />
    </linearGradient>
    <linearGradient id="road" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E5E1D8" />
      <stop offset="100%" stop-color="#B8B2A6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" />
  
  <!-- Mountains -->
  <path d="M64 400 L200 180 L290 320 L400 120 L480 400 Z" fill="#152C14" opacity="0.6" />
  <path d="M120 400 L256 160 L380 340 L448 400 Z" fill="#0E1E0E" />

  <!-- Rising Sun -->
  <circle cx="340" cy="180" r="45" fill="#FFEAA7" opacity="0.9" />

  <!-- Road winding through -->
  <path d="M256 320 L220 512 L292 512 Z" fill="url(#road)" />
  <!-- Center dashed line of road -->
  <path d="M256 320 L256 512" stroke="#2D5A27" stroke-width="8" stroke-dasharray="24 16" stroke-linecap="round" />
</svg>
